# Development Docker Compose Configuration
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: document-pipeline:dev
    container_name: document-pipeline-dev
    ports:
      - "8000:8000"
      - "5678:5678"  # Debugger port
    environment:
      - APP_NAME=Document Processing Pipeline (Dev)
      - LOG_LEVEL=DEBUG
      - CHUNK_SIZE=50
      - MAX_RESULTS=5
      - DOCUMENT_PATH=documents
    volumes:
      # Mount source code for hot reload
      - ./app:/app/app
      - ./src:/app/src
      - ./tests:/app/tests
      # Mount documents directory
      - ./documents:/app/documents
      # Mount logs directory
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - app-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Allow running tests in container
    stdin_open: true
    tty: true

networks:
  app-network:
    driver: bridge
