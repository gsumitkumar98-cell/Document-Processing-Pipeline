# Production Docker Compose Configuration
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: document-pipeline:latest
    container_name: document-pipeline-prod
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Document Processing Pipeline
      - LOG_LEVEL=INFO
      - CHUNK_SIZE=50
      - MAX_RESULTS=5
      - DOCUMENT_PATH=documents
    volumes:
      # Mount documents directory (read-only for security)
      - ./documents:/app/documents:ro
      # Mount logs directory for persistence
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  app-network:
    driver: bridge
